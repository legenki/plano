<div class="app-container">
    
    <!-- Sidebar Control Panel -->
    <aside class="sidebar secuencia-panel right-sidebar">
      <div class="sidebar-header">
        <div class="logo-container">
          <!-- A simple grid/reticula icon -->
          <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="3" y1="9" x2="21" y2="9"></line>
            <line x1="3" y1="15" x2="21" y2="15"></line>
            <line x1="9" y1="3" x2="9" y2="21"></line>
            <line x1="15" y1="3" x2="15" y2="21"></line>
          </svg>
          <span class="logo-text">Reticula</span>
        </div>
        <span class="version-tag">v1.0</span>
      </div>

      <!-- Sidebar scrollable content -->
      <div class="sidebar-content">

        <!-- Section: Tools & Style -->
        <section class="panel-section">
          <h2 class="section-title">
            <span>Tools &amp; Style</span>
            <svg class="chevron-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </h2>
          <div class="section-content">
            
            <div class="app-switcher" id="r-mode-tabs" style="margin-bottom: 16px;">
              <button class="switcher-tab active" data-mode="brush">Brush</button>
              <button class="switcher-tab" data-mode="eraser">Eraser</button>
            </div>

            <div class="control-group color-pickers-row">
              <div>
                <label for="r-color-bg">Background</label>
                <div class="color-picker-wrapper">
                  <input type="color" id="r-color-bg" value="#ffffff">
                  <span id="r-label-bg" class="color-code">#FFFFFF</span>
                </div>
              </div>
              <div>
                <label for="r-color-brush">Brush Color</label>
                <div class="color-picker-wrapper">
                  <input type="color" id="r-color-brush" value="#000000">
                  <span id="r-label-brush" class="color-code">#000000</span>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- Section: Grid Settings -->
        <section class="panel-section">
          <h2 class="section-title">
            <span>Grid Settings</span>
            <svg class="chevron-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </h2>
          <div class="section-content">
            <div class="parameter-row">
              <div class="parameter-header">
                <span class="parameter-label">Grid Size</span>
                <div class="num-input-wrapper">
                  <input type="number" id="r-input-grid-size-num" class="figma-num-input" min="25" max="200" step="25" value="75">
                  <span class="unit">px</span>
                </div>
              </div>
              <input type="range" id="r-slide-grid-size" class="custom-slider" min="25" max="200" step="25" value="75">
            </div>
          </div>
        </section>

      </div>

      <!-- Sidebar Footer / Actions -->
      <footer class="sidebar-footer">
        <button id="r-btn-save-png" class="btn btn-accent" style="width: 100%; margin-bottom: 8px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 13 7 8"></polyline><line x1="12" y1="13" x2="12" y2="3"></line></svg>
          Export as PNG
        </button>
        <button id="r-btn-save-svg" class="btn btn-secondary" style="width: 100%; margin-bottom: 8px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 13 7 8"></polyline><line x1="12" y1="13" x2="12" y2="3"></line></svg>
          Export as SVG
        </button>
        <div class="btn-group" style="width: 100%;">
          <button id="r-btn-reset" class="btn btn-danger" title="Clear Canvas">Clear Canvas</button>
        </div>
      </footer>
    </aside>

    <!-- Canvas Viewport -->
    <main class="canvas-viewport" id="reticula-canvas">
      <!-- p5.js canvas injected here -->
    </main>

  </div>
